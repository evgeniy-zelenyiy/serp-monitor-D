project:
  name: "Example Brand SERP Monitor"
  database_path: "data/serp_history.sqlite3"
  screenshots_dir: "data/screenshots"
  entity_map_path: "data/entity_map.json"

monitoring:
  # Queries to monitor. Add brand, executives, products, common misspellings, and high-risk phrases.
  queries:
    - "Example Brand"
    - "Example Brand reviews"
    - "Example Brand reclamação"
  location_code: 2076 # Brazil
  language_code: "pt"
  device: "desktop"
  os: "windows"
  depth: 20
  search_engine: "google"

sentiment:
  use_openai: true
  openai_model: "${OPENAI_MODEL:-gpt-4o-mini}"
  negative_keywords_pt:
    - "acusação"
    - "boicote"
    - "cancelado"
    - "crime"
    - "denúncia"
    - "fraude"
    - "golpe"
    - "ilegal"
    - "investigação"
    - "mentira"
    - "processo"
    - "procon"
    - "reclamação"
    - "reclame aqui"
    - "roubo"
    - "vazamento"

screenshots:
  enabled: true
  full_page: true
  timeout_ms: 30000
  max_per_run: 10

telegram:
  enabled: true
  send_screenshots: true
  alert_on_sentiments:
    - "negative"
    - "risky"
  max_message_mentions: 20
