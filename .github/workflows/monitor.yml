name: SERP Monitor

on:
  workflow_dispatch:
  schedule:
    # Every 3 days at 08:00 UTC.
    - cron: "0 8 */3 * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore SERP history cache
        uses: actions/cache@v4
        with:
          path: data
          key: serp-monitor-data-${{ github.run_id }}
          restore-keys: |
            serp-monitor-data-

      - name: Run SERP monitor
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m app.main --config config.yaml

      - name: Upload monitor artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serp-monitor-artifacts
          path: |
            data/*.sqlite3
            data/*.json
            data/screenshots/*.png
          if-no-files-found: ignore
