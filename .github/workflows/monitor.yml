name: SERP Monitor

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours.
    - cron: "0 */6 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore SERP history cache
        uses: actions/cache@v4
        with:
          path: data
          key: serp-monitor-data-${{ github.run_id }}
          restore-keys: |
            serp-monitor-data-

      - name: Run SERP monitor
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m app.main --config config.yaml

      - name: Export dashboard data
        if: always()
        run: python scripts/export_dashboard_data.py --config config.yaml --docs-dir docs

      - name: Commit dashboard updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/results.json docs/screenshots docs/index.html docs/styles.css docs/app.js
          git diff --cached --quiet || git commit -m "Update dashboard data"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload monitor artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serp-monitor-artifacts
          path: |
            data/*.sqlite3
            data/*.json
            data/screenshots/*.png
            docs/data/results.json
            docs/screenshots/*.png
          if-no-files-found: ignore
