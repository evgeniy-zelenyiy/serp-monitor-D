<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SERP Monitoring Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">SERP monitoring</p>
        <h1 id="projectName">Reputation dashboard</h1>
      </div>
      <div class="timestamp">Updated <span id="generatedAt">loading</span></div>
    </header>

    <main>
      <section class="summary" aria-label="Monitoring summary">
        <article class="metric"><span>Total mentions</span><strong id="totalMentions">0</strong></article>
        <article class="metric"><span>New mentions</span><strong id="newMentions">0</strong></article>
        <article class="metric"><span>Risky mentions</span><strong id="riskyMentions">0</strong></article>
        <article class="metric"><span>Negative mentions</span><strong id="negativeMentions">0</strong></article>
        <article class="metric"><span>Positive mentions</span><strong id="positiveMentions">0</strong></article>
        <article class="metric"><span>Neutral mentions</span><strong id="neutralMentions">0</strong></article>
      </section>

      <section class="toolbar" aria-label="Dashboard controls">
        <div class="filters">
          <button class="filter active" data-filter="all" type="button">All</button>
          <button class="filter" data-filter="new" type="button">New</button>
          <button class="filter" data-filter="risky" type="button">Risky</button>
          <button class="filter" data-filter="negative" type="button">Negative</button>
          <button class="filter" data-filter="neutral" type="button">Neutral</button>
          <button class="filter" data-filter="positive" type="button">Positive</button>
        </div>
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Title, URL, domain, query" autocomplete="off" />
        </label>
      </section>

      <section class="table-shell" aria-label="SERP mentions table">
        <table>
          <thead>
            <tr>
              <th><button data-sort="first_seen" type="button">First seen</button></th>
              <th><button data-sort="last_seen" type="button">Last seen</button></th>
              <th>Query</th>
              <th><button data-sort="rank" type="button">Rank</button></th>
              <th>Title</th>
              <th>URL</th>
              <th>Domain</th>
              <th><button data-sort="sentiment" type="button">Sentiment</button></th>
              <th><button data-sort="risk_level" type="button">Risk level</button></th>
              <th>Risk keywords</th>
              <th>Source</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="mentionsBody">
            <tr><td colspan="12" class="empty">Loading dashboard data</td></tr>
          </tbody>
        </table>
      </section>

      <section class="domain-section" aria-label="Entity and domain summary">
        <div class="section-heading">
          <h2>Entity / Domain Summary</h2>
          <p id="domainCount">0 domains</p>
        </div>
        <div id="domains" class="domain-grid"></div>
      </section>

      <section class="gallery-section" aria-label="Screenshots gallery">
        <div class="section-heading">
          <h2>Screenshots</h2>
          <p id="screenshotCount">0 captures</p>
        </div>
        <div id="screenshots" class="gallery"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
